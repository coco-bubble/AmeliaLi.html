<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 梯形框 */

.logo-box{

    padding:30px 120px;

    border:2px solid #00eaff;

    clip-path: polygon(8% 0%, 92% 0%, 100% 100%, 0% 100%);

    box-shadow:
        0 0 10px #00eaff,
        0 0 30px #00eaff;

    text-align:center;

    cursor:pointer;
}

/* 字体 */

.logo{

    font-family:'Orbitron', sans-serif;

    font-size:70px;

    letter-spacing:12px;

    color:#00eaff;

    text-shadow:
        0 0 5px #00eaff,
        0 0 10px #00eaff,
        0 0 20px #00eaff;

}

/* 呼吸 */

.breath{

animation: glow 2.5s ease-in-out infinite;

}

@keyframes glow{

0%{
text-shadow:
0 0 5px #00eaff,
0 0 10px #00eaff;
}

50%{
text-shadow:
0 0 10px #00eaff,
0 0 30px #00eaff,
0 0 60px #00eaff,
0 0 120px #00eaff;
}

100%{
text-shadow:
0 0 5px #00eaff,
0 0 10px #00eaff;
}

}

</style>
</head>

<body>

<div class="logo-box" onclick="toggleGlow()">
<div class="logo">AMELIA</div>
</div>

<script>

function toggleGlow(){

document.querySelector(".logo").classList.toggle("breath")

}

</script>

</body>
</html>
