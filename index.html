<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>

body{
    background:black;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.logo{

    font-family:'Orbitron',sans-serif;

    font-size:140px;        
    letter-spacing:18px;

    color:#00eaff;

    padding:40px 120px;

    border:3px solid #00eaff;

    cursor:pointer;

    text-shadow:
        0 0 10px #00eaff,
        0 0 20px #00eaff,
        0 0 40px #00eaff,
        0 0 80px #00eaff;

    box-shadow:
        0 0 20px #00eaff,
        0 0 80px #00eaff,
        0 0 160px #00eaff;

}



.breathing{

animation: glow 2.5s ease-in-out infinite;

}

@keyframes glow{

0%{
    text-shadow:
    0 0 10px #00eaff,
    0 0 30px #00eaff,
    0 0 60px #00eaff;
}

50%{
    text-shadow:
    0 0 20px #00eaff,
    0 0 60px #00eaff,
    0 0 120px #00eaff,
    0 0 200px #00eaff;
}

100%{
    text-shadow:
    0 0 10px #00eaff,
    0 0 30px #00eaff,
    0 0 60px #00eaff;
}

}

</style>
</head>

<body>

<div class="logo" onclick="toggleGlow()">AMELIA</div>

<script>

function toggleGlow(){
document.querySelector(".logo").classList.toggle("breathing")
}

</script>

</body>
</html>
